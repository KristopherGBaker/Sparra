# Example config — greenfield iOS app (Jotter, a SwiftData notes app).
#
# CROSS-BACKEND run: Codex (gpt-5.5) BUILDS; Claude (opus) JUDGES. Independent model
# families on the two sides of the GAN loop catch each other's blind spots. Everything
# not listed inherits Sparra's defaults; the Apple/Swift house conventions are injected
# into the generator automatically for mechanism: ios.
roles:
  # Builder side → Codex gpt-5.5 (the generator also drives decomposition).
  generator:         { backend: codex,  model: gpt-5.5 }
  contractGenerator: { backend: codex,  model: gpt-5.5 }
  prototyper:        { backend: codex,  model: gpt-5.5 }
  # Judge / plan side → Claude opus (independent grader + adversarial contract critic).
  # Decomposition is a PLANNING act — keep it on Claude (Codex tends to over-split).
  decomposer:        { backend: claude, model: opus, effort: high }
  evaluator:         { backend: claude, model: opus, effort: high }
  contractEvaluator: { backend: claude, model: opus, effort: high }
  planner:           { backend: claude, model: opus, effort: high }
  reflector:         { backend: claude, model: opus, effort: high }
  orienter:          { backend: claude, model: opus }

exercise:
  mechanism: ios
  # scheme: "" → discovered; simulator: "" → an available one is picked (or pin a model).
  ios: { cli: "xcodebuildmcp", scheme: "", simulator: "" }

format:
  # SwiftFormat reflows; SwiftLint --fix auto-corrects lint. Run both before the evaluator
  # builds. Missing tools = no-op + warning, never a build failure.
  command: "sh -c 'swiftformat {file}; swiftlint --fix --path {file}'"

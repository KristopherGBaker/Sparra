# Example config — tuned for a fast, watchable end-to-end run.
# Uses sonnet for the roles that write/judge code, haiku for the lightweight roles.
roles:
  orienter:          { model: haiku }
  planner:           { model: haiku }
  prototyper:        { model: haiku }
  contractGenerator: { model: haiku }
  contractEvaluator: { model: sonnet }
  generator:         { model: sonnet }
  evaluator:         { model: sonnet }
  reflector:         { model: haiku }

permission:
  mode: auto                # auto if available on your plan, else acceptEdits; never bypass
  denyBashContains: ["rm -rf /", "git push", "shutdown", "mkfs"]

git:
  strategy: inplace        # greenfield example builds into the work dir directly
  branchPrefix: "sparra/"
  autoCommit: false

rubric:
  weights: { design: 0.2, originality: 0.1, craft: 0.3, functionality: 0.4 }
  passThreshold: 70
  useCalibration: false

pivot: { N: 3, threshold: 40 }

contract: { assertionMin: 8, assertionMax: 16, maxNegotiationRounds: 2 }

# Per-item USD budget — the loop "starts closed". When an item's cost crosses the
# cap it halts as BUDGET_EXCEEDED and the run continues. 0 = opt out (no cap).
# (This tiny example builds one cheap CLI, so leave it uncapped.)
build: { maxRoundsPerItem: 3, maxTurnsPerSession: 50, maxBudgetUsdPerItem: 0 }

# PostToolUse formatter: format each written file before the evaluator exercises it.
# command="" → auto-detect by file type (prettier for JS/TS). Missing tool = no-op + warning.
format: { enabled: true, command: "", autodetect: true }

exercise:
  mechanism: cli
  runExistingTests: false
  existingTestCommand: ""
  customRecipe: ""
  web: { startCommand: "", baseUrl: "" }
  ios: { scheme: "", simulator: "" }

deviation: { strictness: free }

batch: { K: 2 }
